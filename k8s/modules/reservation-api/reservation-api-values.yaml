replicaCount: ${replicas}

image:
  repository: ${image_repository}
  tag: ${image_tag}
  pullPolicy: ${image_pull_policy}

database:
  host: ${db_host}
  port: ${db_port}
  user: ${db_user}
  name: ${db_name}
  sslMode: ${db_ssl_mode}
  existingSecret: ${env_secret_name}
  databaseUrlKey: DATABASE_URL
  passwordKey: PGPASSWORD

service:
  type: ${service_type}
  port: ${service_port}

redis:
  enabled: ${redis_enabled}

celery:
  enabled: ${celery_enabled}
  worker:
    replicas: ${celery_workers}
  beat:
    enabled: ${celery_beat}
