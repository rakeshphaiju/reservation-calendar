replicaCount: ${replicas}

image:
  repository: ${image_repository}
  tag: ${image_tag}
  pullPolicy: ${image_pull_policy}

database:
  host: ${db_host}
  port: ${db_port}
  user: ${db_user}
  password: ${db_password}
  name: ${db_name}
  sslMode: ${db_ssl_mode}

service:
  type: ${service_type}
  port: ${service_port}
