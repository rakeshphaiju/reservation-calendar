{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reservation-api.redisServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reservation-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.port }}
      protocol: TCP
      name: redis
  selector:
    {{- include "reservation-api.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
