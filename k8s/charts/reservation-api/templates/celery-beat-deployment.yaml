{{- if and .Values.celery.enabled .Values.celery.beat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reservation-api.fullname" . }}-celery-beat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reservation-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "reservation-api.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels:
        {{- include "reservation-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-beat
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reservation-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgres
          image: "postgres:16-alpine"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Values.database.host }} -p {{ .Values.database.port }} -U {{ .Values.database.user }}; do
                echo "Waiting for PostgreSQL at {{ .Values.database.host }}:{{ .Values.database.port }}..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.passwordKey }}
              {{- else }}
              value: {{ .Values.database.password | quote }}
              {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until redis-cli -h {{ include "reservation-api.redisServiceName" . }} -p {{ .Values.redis.service.port }} ping; do
                echo "Waiting for Redis at {{ include "reservation-api.redisServiceName" . }}:{{ .Values.redis.service.port }}..."
                sleep 2
              done
              echo "Redis is ready!"
        {{- end }}
      containers:
        - name: celery-beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.celery.beat.command | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DATABASE_URL
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.databaseUrlKey }}
              {{- else }}
              value: {{ include "reservation-api.databaseUrl" . | quote }}
              {{- end }}
            - name: PGPASSWORD
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.passwordKey }}
              {{- else }}
              value: {{ .Values.database.password | quote }}
              {{- end }}
            - name: CELERY_BROKER_URL
              value: {{ include "reservation-api.celeryBrokerUrl" . | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ include "reservation-api.celeryResultBackend" . | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.celery.beat.resources | nindent 12 }}
{{- end }}
